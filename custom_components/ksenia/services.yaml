# yaml-language-server: $schema=../../schemas/yaml/services_schema.yaml
# Describes the format for available services for ksenia


reload_data:
  name: Reload Data
  description: Force a refresh of the integration data from the API

run_scenario:
  name: Run Scenario
  description: Run a Ksenia scenario by name using a target entity
  target:
    entity:
      integration: ksenia
  fields:
    scenario_name:
      name: Scenario Name
      description: The name of the scenario to execute
      required: true
      example: "Arm Away"
      selector:
        text:

zone_bypass:
  name: "Toggle Zone Bypass"
  description: "Toggles the bypass (exclusion) state of a Ksenia alarm zone."
  fields:
    entity_id:
      name: Zone Entity
      description: "The binary sensor entity representing the zone to bypass."
      required: true
      selector:
        entity:
          domain: binary_sensor
          integration: ksenia
